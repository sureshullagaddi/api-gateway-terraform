name: "Terraform"

# ============================================================================
# TRIGGER STRATEGY
#
#   Any branch push / PR  →  plan dev only   (fast feedback, no AWS changes)
#   Push to main          →  apply dev → sit → stage → prod  (sequential gate)
#
# "As of now" the deploy matrix is [dev] only.
# To promote to the full pipeline, change the deploy matrix below to:
#   environment: [dev, sit, stage, prod]
# ============================================================================

on:
  push:
    branches: ["**"]          # every branch push triggers a plan on dev
    paths:
      - "environments/**"
      - "modules/**"
      - "lambda/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]          # PRs to main also trigger a plan on dev
    paths:
      - "environments/**"
      - "modules/**"
      - "lambda/**"
      - ".github/workflows/**"

permissions:
  id-token: write       # OIDC token exchange with AWS
  contents: read
  pull-requests: write  # Post plan output as PR comment

# ============================================================================
# JOB 1 — Plan dev (non-main branches and PRs)
# Runs on every branch push that is NOT main, and on every PR.
# Gives developers fast feedback before merging.
# ============================================================================
jobs:
  plan-dev:
    name: "Plan [dev]"
    runs-on: ubuntu-latest

    # Skip this job on main branch pushes — the deploy job covers that
    if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'

    environment: dev

    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # OIDC: no static AWS credentials stored anywhere
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}
          role-session-name: github-actions-dev-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: .        # check entire repo, not just dev
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -no-color \
            -input=false \
            2>&1 | tee plan_output.txt
        continue-on-error: true   # capture output before deciding to fail

      # Post plan summary as a PR comment (only when triggered by a PR)
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('environments/dev/plan_output.txt', 'utf8');
            const truncated = raw.length > 60000
              ? raw.substring(0, 60000) + '\n\n... [truncated]'
              : raw;

            const icon = (outcome) => outcome === 'success' ? '✅ Pass' : '❌ Fail';

            const body = [
              '## Terraform Plan — `dev`',
              '',
              '| Step | Status |',
              '|------|--------|',
              `| 🖌 Format   | ${icon('${{ steps.fmt.outcome }}')} |`,
              `| ⚙️ Init     | ${icon('${{ steps.init.outcome }}')} |`,
              `| ✅ Validate | ${icon('${{ steps.validate.outcome }}')} |`,
              `| 📋 Plan     | ${icon('${{ steps.plan.outcome }}')} |`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              `*Branch: \`${{ github.head_ref || github.ref_name }}\` · Actor: @${{ github.actor }}*`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

# ============================================================================
# JOB 2 — Deploy (main branch only)
# Runs only on push to main. Applies Terraform sequentially through all
# active environments. max-parallel: 1 ensures strict promotion order —
# if dev fails, sit/stage/prod are never touched.
#
# CURRENT SCOPE: dev only.
# TO EXPAND: change the matrix to [dev, sit, stage, prod]
# ============================================================================
  deploy:
    name: "Deploy [${{ matrix.environment }}]"
    runs-on: ubuntu-latest

    # Only runs on direct push to main (not PRs, not other branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      max-parallel: 1    # strict sequential — dev must pass before sit starts, etc.
      matrix:
        # ┌─────────────────────────────────────────────────────────────┐
        # │  ACTIVE ENVIRONMENTS                                         │
        # │  Current: dev only                                           │
        # │  Expand:  change to [dev, sit, stage, prod] when ready       │
        # └─────────────────────────────────────────────────────────────┘
        environment: [dev]

    environment: ${{ matrix.environment }}

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}
          role-session-name: github-actions-${{ matrix.environment }}-deploy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -out=tfplan \
            -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
