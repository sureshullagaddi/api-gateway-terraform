name: "Terraform Deploy"

# ============================================================================
# TRIGGER STRATEGY
#
#   Feature branch push       →  plan dev only        (no apply, ever)
#   PR to main                →  plan dev + PR comment (no apply, ever)
#   Push to main              →  plan + apply dev      (real AWS changes)
#   Manual (workflow_dispatch) →  plan always
#                                apply ONLY if source branch is main
#
# ============================================================================

on:
  push:
    branches: ["**"]
    paths:
      - "environments/**"
      - "modules/**"
      - "lambda/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - "lambda/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - sit
          - stage
          - prod
      confirm:
        description: |
          Type the environment name exactly to confirm (e.g. "dev").
          Mismatches abort immediately — nothing is deployed.
          NOTE: apply only runs when triggered from the main branch.
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write

# ============================================================================
# JOB 0 — Safety check (manual trigger only)
# ============================================================================
jobs:
  confirm-input:
    name: "Safety Check"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify confirmation matches environment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "❌ Confirmation '${{ github.event.inputs.confirm }}' does not match environment '${{ github.event.inputs.environment }}'"
            echo "   Aborting — nothing was deployed."
            exit 1
          fi
          echo "✅ Confirmation matches — proceeding with '${{ github.event.inputs.environment }}'"
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "⚠️  Branch is '${{ github.ref_name }}' (not main) — plan will run but apply will be SKIPPED"
          else
            echo "🚀 Branch is main — plan + apply will both run"
          fi

  # ============================================================================
  # JOB 1 — Plan dev (feature branches + PRs, never applies)
  # ============================================================================
  plan-dev:
    name: "Plan [dev]"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' && (github.ref != 'refs/heads/main' || github.event_name == 'pull_request')

    environment: dev

    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}
          role-session-name: github-actions-dev-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format (auto-fix)
        run: terraform fmt -recursive
        working-directory: .

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -no-color \
            -input=false \
            2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('environments/dev/plan_output.txt', 'utf8');
            const truncated = raw.length > 60000 ? raw.substring(0, 60000) + '\n\n... [truncated]' : raw;
            const icon = (outcome) => outcome === 'success' ? '✅ Pass' : '❌ Fail';
            const body = [
              '## Terraform Plan — `dev`',
              '> ⚠️ **Plan only** — apply runs only on merge to `main`',
              '',
              '| Step | Status |',
              '|------|--------|',
              `| ⚙️ Init     | ${icon('${{ steps.init.outcome }}')} |`,
              `| ✅ Validate | ${icon('${{ steps.validate.outcome }}')} |`,
              `| 📋 Plan     | ${icon('${{ steps.plan.outcome }}')} |`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              `*Branch: \`${{ github.head_ref || github.ref_name }}\` · Actor: @${{ github.actor }}*`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ============================================================================
  # JOB 2 — Auto deploy (main branch push only — plan + apply)
  # ============================================================================
  deploy:
    name: "Deploy [${{ matrix.environment }}]"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      max-parallel: 1
      matrix:
        environment: [dev]
        # Expand to [dev, sit, stage, prod] when ready

    environment: ${{ matrix.environment }}

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}
          role-session-name: github-actions-${{ matrix.environment }}-deploy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format (auto-fix)
        run: terraform fmt -recursive
        working-directory: .

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -out=tfplan \
            -input=false

      - name: Terraform Apply   # ← ONLY runs because github.ref == main (enforced by job-level if)
        run: terraform apply -auto-approve -input=false tfplan

  # ============================================================================
  # JOB 3 — Manual deploy (workflow_dispatch)
  #   - Plan always runs
  #   - Apply only runs when triggered from main branch
  # ============================================================================
  deploy-manual:
    name: "Manual Deploy [${{ github.event.inputs.environment }}]"
    runs-on: ubuntu-latest
    needs: confirm-input
    if: github.event_name == 'workflow_dispatch'

    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}
          role-session-name: github-actions-${{ github.event.inputs.environment }}-manual-deploy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format (auto-fix)
        run: terraform fmt -recursive
        working-directory: .

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -out=tfplan \
            -input=false

      - name: Terraform Apply   # ← skipped when not on main branch
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Apply Skipped Notice
        if: github.ref != 'refs/heads/main'
        run: |
          echo "⚠️  Apply was SKIPPED — manual deploy was triggered from branch '${{ github.ref_name }}', not main."
          echo "   Merge your changes to main first, then re-trigger this workflow."

      - name: Summary
        if: always()
        run: |
          APPLY_STATUS="⏭️ Skipped (not on main)"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            APPLY_STATUS="✅ Applied"
          fi
          echo "## Manual Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Apply | ${APPLY_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
